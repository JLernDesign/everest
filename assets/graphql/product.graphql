query Product($slug: String) {
  product(filter: { slug: { eq: $slug } }) {
    seo: _seoMetaTags {
      attributes
      content
      tag
    }
    hero {
      headline
      intro
      cta {
        buttons {
          label
          internal
          external
          style
        }
      }
      image {
        url
      }
    }
    modules {
      __typename
      ... on NumberBucketGroupRecord {
        header {
          eyebrow
          headline
          intro
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
        }
        __typename
        buckets {
          headline
          description
        }
      }
      ... on BlogCalloutRecord {
        __typename
      }
      ... on BannerCalloutRecord {
        __typename
        headline
        intro
        cta {
          buttons {
            label
            internal
            external
            style
          }
        }
      }
      ... on OverviewRecord {
        __typename
        header {
          eyebrow
          headline
          intro
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
        }
        sections {
          id
          title
          headline
          body
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
          image {
            url
          }
        }
      }
      ... on IntegrationListRecord {
        __typename
        header {
          eyebrow
          headline
          intro
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
        }
        groups {
          title
          headerLeft
          headerRight
          items {
            name
            description
            image {
              url
            }
          }
        }
      }
      ... on AscendingSliderRecord {
        header {
          eyebrow
          headline
          intro
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
        }
        modules {
          headline
          body
          image {
            url
          }
        }
      }
      ... on ClientSuccessRecord {
        header {
          eyebrow
          headline
          intro
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
        }
        jaggedEdge
        slides {
          name
          title
          quote
          statsGroup {
            stats {
              figure
              label
            }
          }
          media {
            image {
              url
            }
            video {
              url
            }
          }
          logo {
            url
          }
        }
      }
    }
    footerCallout {
      headline
      intro
      cta {
        buttons {
          label
          internal
          external
          style
        }
      }
    }
  }
}
