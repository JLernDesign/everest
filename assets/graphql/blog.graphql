query Blog($slug: String) {
  post(filter: { slug: { eq: $slug } }) {
    id
    title
    slug
    publishDate
    tag {
      name
      slug
    }
    author {
      name
      photo {
        url
      }
    }
    image {
      responsiveImage(imgixParams: { fit: fillmax, w: 1400, h: 1050 }) {
        src
        width
        height
        alt
        base64
      }
    }
    intro
    content {
      value
      blocks {
        __typename
        ... on RecordInterface {
          __typename
        }
        ... on QuoteRecord {
          id
          __typename
          text
        }
      }
    }
    seoTags {
      title
      description
      image {
        url
      }
    }
  }
}
