#import "../assets/graphql/fragments/header.graphql"

query Home {
  home {
    hero {
      headline
      intro
      cta {
        buttons {
          label
          internal
          external
          style
        }
      }
    }
    intro {
      headline
      intro
      cta {
        buttons {
          label
          internal
          external
          style
        }
      }
    }
    featuredLogos {
      title
      logos {
        url
      }
    }
    modules {
      __typename
      ... on BlogCalloutRecord {
        __typename
      }
      ... on BannerCalloutRecord {
        __typename
        headline
        intro
        cta {
          buttons {
            label
            internal
            external
            style
          }
        }
      }
      ... on OverviewRecord {
        __typename
        header {
          eyebrow
          headline
          intro
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
        }
        sections {
          id
          title
          headline
          body
          cta {
            buttons {
              label
              internal
              external
              style
            }
          }
          image {
            url
          }
        }
      }
      ... on IntegrationListRecord {
        __typename
      }
    }
  }
}
