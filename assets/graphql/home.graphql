#import "../assets/graphql/fragments/header.graphql"

query Home {
  home {
    hero {
      headline
      intro
      cta {
        buttons {
          label
          internal
          external
          style
        }
      }
    }
    intro {
      headline
      intro
      cta {
        buttons {
          label
          internal
          external
          style
        }
      }
    }
    modules {
      __typename
      ... on BlogCalloutRecord {
        __typename
      }
      ... on BannerCalloutRecord {
        __typename
      }
      ... on OverviewRecord {
        __typename
      }
      ... on IntegrationListRecord {
        __typename
      }
    }
  }
}
